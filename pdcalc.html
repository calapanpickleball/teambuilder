<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pickleball Tournament Score Form</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 16px;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 26px;
    }

    .section {
      margin-bottom: 28px;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      background: #fff;
      border-radius: 10px;
    }

    table {
      width: 100%;
      min-width: 900px;
      border-collapse: collapse;
      background: #fff;
      color: #000;
    }

    th, td {
      border: 1px solid #333;
      padding: 8px 10px;
      text-align: center;
      vertical-align: middle;
      white-space: nowrap;
    }

    th {
      font-weight: 700;
    }

    .green {
      background: #6aa84f;
      color: #fff;
    }

    .blue {
      background: #0b5394;
      color: #fff;
    }

    .red {
      background: #990000;
      color: #fff;
    }

    .summary-orange {
      background: #e6b87a;
    }

    .team-col {
      text-align: left;
      min-width: 140px;
      background: #d9ead3;
      font-weight: 600;
    }

    .summary-team {
      background: #f3f3f3;
      text-align: left;
      font-weight: 600;
    }

    input[type="number"] {
      width: 68px;
      min-height: 42px;
      padding: 6px 8px;
      text-align: center;
      font-size: 16px;
      border: 1px solid #bbb;
      border-radius: 6px;
      outline: none;
    }

    input[type="number"]:focus {
      border-color: #0b5394;
    }

    .match-card {
      margin-bottom: 24px;
      border: 1px solid #333;
      border-radius: 12px;
      background: #1a1a1a;
      padding: 14px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
    }

    .match-title {
      margin-bottom: 12px;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }

    .win {
      color: #0a7a0a;
      font-weight: 700;
    }

    .loss {
      color: #a61c1c;
      font-weight: 700;
    }

    .muted {
      color: #666;
      font-weight: 700;
    }

    @media (max-width: 768px) {
      body {
        padding: 10px;
      }

      h1 {
        font-size: 22px;
      }

      .match-card {
        padding: 10px;
        border-radius: 10px;
      }

      .match-title {
        font-size: 16px;
        line-height: 1.3;
      }

      table {
        min-width: 820px;
      }

      th, td {
        padding: 7px 8px;
        font-size: 12px;
      }

      input[type="number"] {
        width: 60px;
        min-height: 40px;
        font-size: 16px;
      }

      .team-col,
      .summary-team {
        min-width: 120px;
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 20px;
      }

      .match-title {
        font-size: 15px;
      }

      table {
        min-width: 780px;
      }

      th, td {
        padding: 6px;
        font-size: 11px;
      }

      input[type="number"] {
        width: 56px;
        min-height: 38px;
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="section">
      <h1>Pickleball Tournament Summary</h1>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="green">Team Name</th>
              <th class="green"># of GAMES Won</th>
              <th class="green"># of MATCH Won</th>
              <th class="green">Total Point Differential</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td class="summary-team">Team 1</td>
              <td class="summary-orange" id="sum-games-t1">0</td>
              <td class="summary-orange" id="sum-match-t1">0</td>
              <td class="summary-orange" id="sum-pd-t1">0</td>
            </tr>
            <tr>
              <td class="summary-team">Team 2</td>
              <td class="summary-orange" id="sum-games-t2">0</td>
              <td class="summary-orange" id="sum-match-t2">0</td>
              <td class="summary-orange" id="sum-pd-t2">0</td>
            </tr>
            <tr>
              <td class="summary-team">Team 3</td>
              <td class="summary-orange" id="sum-games-t3">0</td>
              <td class="summary-orange" id="sum-match-t3">0</td>
              <td class="summary-orange" id="sum-pd-t3">0</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div id="matches"></div>
  </div>

  <script>
    const teams = {
      t1: "Team 1",
      t2: "Team 2",
      t3: "Team 3"
    };

    const matchList = [
      { id: "m1", teamA: "t1", teamB: "t2", title: "Team 1 vs Team 2" },
      { id: "m2", teamA: "t2", teamB: "t3", title: "Team 2 vs Team 3" },
      { id: "m3", teamA: "t1", teamB: "t3", title: "Team 1 vs Team 3" }
    ];

    const gameLabels = [
      "Womens Doubles",
      "Mens Doubles",
      "Mixed Doubles 1",
      "Mixed Doubles 2",
      "Dreambreaker"
    ];

    function createMatchTables() {
      const container = document.getElementById("matches");

      matchList.forEach(match => {
        const card = document.createElement("div");
        card.className = "match-card";

        card.innerHTML = `
          <div class="match-title">${match.title}</div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th class="green">Team Name</th>
                  <th class="blue">Womens Doubles</th>
                  <th class="blue">Mens Doubles</th>
                  <th class="blue">Mixed Doubles 1</th>
                  <th class="blue">Mixed Doubles 2</th>
                  <th class="blue">Dreambreaker</th>
                  <th class="red">Games Won</th>
                  <th class="red">Point Differential</th>
                  <th class="red">Result</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td class="team-col">${teams[match.teamA]}</td>
                  ${gameLabels.map((_, i) => `
                    <td>
                      <input
                        type="number"
                        min="0"
                        inputmode="numeric"
                        data-match="${match.id}"
                        data-team="A"
                        data-game="${i}"
                      />
                    </td>
                  `).join("")}
                  <td id="${match.id}-a-games">0</td>
                  <td id="${match.id}-a-pd">0</td>
                  <td id="${match.id}-a-result" class="muted"></td>
                </tr>
                <tr>
                  <td class="team-col">${teams[match.teamB]}</td>
                  ${gameLabels.map((_, i) => `
                    <td>
                      <input
                        type="number"
                        min="0"
                        inputmode="numeric"
                        data-match="${match.id}"
                        data-team="B"
                        data-game="${i}"
                      />
                    </td>
                  `).join("")}
                  <td id="${match.id}-b-games">0</td>
                  <td id="${match.id}-b-pd">0</td>
                  <td id="${match.id}-b-result" class="muted"></td>
                </tr>
              </tbody>
            </table>
          </div>
        `;

        container.appendChild(card);
      });
    }

    function getInputValue(matchId, team, gameIndex) {
      const input = document.querySelector(
        `input[data-match="${matchId}"][data-team="${team}"][data-game="${gameIndex}"]`
      );
      if (!input || input.value === "") return null;
      return Number(input.value);
    }

    function calculateAll() {
      const summary = {
        t1: { gamesWon: 0, matchWon: 0, pointDiff: 0 },
        t2: { gamesWon: 0, matchWon: 0, pointDiff: 0 },
        t3: { gamesWon: 0, matchWon: 0, pointDiff: 0 }
      };

      matchList.forEach(match => {
        let aGamesWon = 0;
        let bGamesWon = 0;
        let aPointDiff = 0;
        let bPointDiff = 0;

        let firstFourCompleted = 0;
        let dreambreakerCompleted = false;

        for (let i = 0; i < 5; i++) {
          const a = getInputValue(match.id, "A", i);
          const b = getInputValue(match.id, "B", i);

          if (a !== null && b !== null) {
            aPointDiff += (a - b);
            bPointDiff += (b - a);

            if (a > b) aGamesWon++;
            if (b > a) bGamesWon++;

            if (i < 4) firstFourCompleted++;
            if (i === 4) dreambreakerCompleted = true;
          }
        }

        document.getElementById(`${match.id}-a-games`).textContent = aGamesWon;
        document.getElementById(`${match.id}-b-games`).textContent = bGamesWon;
        document.getElementById(`${match.id}-a-pd`).textContent = aPointDiff;
        document.getElementById(`${match.id}-b-pd`).textContent = bPointDiff;

        const aResultEl = document.getElementById(`${match.id}-a-result`);
        const bResultEl = document.getElementById(`${match.id}-b-result`);

        aResultEl.textContent = "";
        bResultEl.textContent = "";
        aResultEl.className = "muted";
        bResultEl.className = "muted";

        let matchWinner = null;

        if (firstFourCompleted === 4) {
          let aRegularWins = 0;
          let bRegularWins = 0;

          for (let i = 0; i < 4; i++) {
            const a = getInputValue(match.id, "A", i);
            const b = getInputValue(match.id, "B", i);

            if (a !== null && b !== null) {
              if (a > b) aRegularWins++;
              if (b > a) bRegularWins++;
            }
          }

          if (aRegularWins > bRegularWins) {
            matchWinner = "A";
          } else if (bRegularWins > aRegularWins) {
            matchWinner = "B";
          } else {
            if (dreambreakerCompleted) {
              const aDream = getInputValue(match.id, "A", 4);
              const bDream = getInputValue(match.id, "B", 4);

              if (aDream > bDream) {
                matchWinner = "A";
              } else if (bDream > aDream) {
                matchWinner = "B";
              }
            }
          }
        }

        if (matchWinner === "A") {
          aResultEl.textContent = "WIN";
          bResultEl.textContent = "LOSS";
          aResultEl.className = "win";
          bResultEl.className = "loss";
          summary[match.teamA].matchWon += 1;
        } else if (matchWinner === "B") {
          aResultEl.textContent = "LOSS";
          bResultEl.textContent = "WIN";
          aResultEl.className = "loss";
          bResultEl.className = "win";
          summary[match.teamB].matchWon += 1;
        }

        summary[match.teamA].gamesWon += aGamesWon;
        summary[match.teamB].gamesWon += bGamesWon;
        summary[match.teamA].pointDiff += aPointDiff;
        summary[match.teamB].pointDiff += bPointDiff;
      });

      document.getElementById("sum-games-t1").textContent = summary.t1.gamesWon;
      document.getElementById("sum-games-t2").textContent = summary.t2.gamesWon;
      document.getElementById("sum-games-t3").textContent = summary.t3.gamesWon;

      document.getElementById("sum-match-t1").textContent = summary.t1.matchWon;
      document.getElementById("sum-match-t2").textContent = summary.t2.matchWon;
      document.getElementById("sum-match-t3").textContent = summary.t3.matchWon;

      document.getElementById("sum-pd-t1").textContent = summary.t1.pointDiff;
      document.getElementById("sum-pd-t2").textContent = summary.t2.pointDiff;
      document.getElementById("sum-pd-t3").textContent = summary.t3.pointDiff;
    }

    createMatchTables();

    document.addEventListener("input", (e) => {
      if (e.target.matches('input[type="number"]')) {
        calculateAll();
      }
    });

    calculateAll();
  </script>
</body>
</html>
