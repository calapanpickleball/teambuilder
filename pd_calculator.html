<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickleball Tournament</title>

<style>
body {
  margin: 0;
  padding: 12px;
  font-family: Arial, sans-serif;
  background: #f5f7fa;
  color: #222;
}

.container {
  max-width: 600px;
  margin: auto;
}

h1 {
  font-size: 22px;
  margin-bottom: 12px;
}

/* SUMMARY */
.summary {
  background: #ffffff;
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 20px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.summary-row {
  display: grid;
  grid-template-columns: 1fr 60px 60px 80px;
  font-size: 13px;
  margin-bottom: 6px;
}

.summary-row:first-child {
  font-weight: bold;
  border-bottom: 1px solid #ddd;
  padding-bottom: 6px;
}

/* MATCH CARD */
.card {
  background: #ffffff;
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 18px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

.match-title {
  font-weight: bold;
  margin-bottom: 10px;
  font-size: 16px;
  color: #0b5394;
}

/* HEADER */
.team-header {
  display: grid;
  grid-template-columns: 1fr 70px 70px;
  margin-bottom: 6px;
  font-size: 12px;
  color: #555;
}

/* ROWS */
.row {
  display: grid;
  grid-template-columns: 1fr 70px 70px;
  align-items: center;
  margin-bottom: 8px;
  gap: 6px;
}

.label {
  font-size: 13px;
}

/* INPUT */
input {
  width: 100%;
  height: 42px;
  text-align: center;
  font-size: 16px;
  border-radius: 6px;
  border: 1px solid #ccc;
  background: #fafafa;
}

input:focus {
  outline: none;
  border-color: #0b5394;
  background: #fff;
}

/* RESULT */
.result {
  margin-top: 10px;
  font-weight: bold;
  text-align: center;
}

.win {
  color: #2e7d32;
}

.loss {
  color: #c62828;
}

/* MOBILE TWEAK */
@media (max-width: 480px) {
  h1 {
    font-size: 20px;
  }

  .label {
    font-size: 12px;
  }

  input {
    height: 40px;
    font-size: 15px;
  }
}
</style>
</head>

<body>
<div class="container">

<h1>Point Differential Calculator <h1>

<div class="summary">
  <div class="summary-row"><span>Team</span><span>Games Won</span><span>Matches Won</span><span>Total Point Differential</span></div>
  <div class="summary-row"><span>Team 1</span><span id="g1">0</span><span id="m1">0</span><span id="p1">0</span></div>
  <div class="summary-row"><span>Team 2</span><span id="g2">0</span><span id="m2">0</span><span id="p2">0</span></div>
  <div class="summary-row"><span>Team 3</span><span id="g3">0</span><span id="m3">0</span><span id="p3">0</span></div>
</div>

<div id="matches"></div>

</div>

<script>
const teams = {
  t1: "Team 1",
  t2: "Team 2",
  t3: "Team 3"
};

const matches = [
  { id: "m1", a: "t1", b: "t2", title: "Team 1 vs Team 2" },
  { id: "m2", a: "t2", b: "t3", title: "Team 2 vs Team 3" },
  { id: "m3", a: "t1", b: "t3", title: "Team 1 vs Team 3" }
];

const games = [
  "Womens Doubles",
  "Mens Doubles",
  "Mixed Doubles 1",
  "Mixed Doubles 2",
  "Dreambreaker"
];

function createMatches() {
  const container = document.getElementById("matches");

  matches.forEach(match => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="match-title">${match.title}</div>

      <div class="team-header">
        <div></div>
        <div>${teams[match.a]}</div>
        <div>${teams[match.b]}</div>
      </div>

      ${games.map((g, i) => `
        <div class="row">
          <div class="label">${g}</div>
          <input type="number" data-m="${match.id}" data-t="A" data-g="${i}">
          <input type="number" data-m="${match.id}" data-t="B" data-g="${i}">
        </div>
      `).join("")}

      <div class="result" id="${match.id}-result"></div>
    `;

    container.appendChild(card);
  });
}

function val(m,t,g){
  const el=document.querySelector(`[data-m="${m}"][data-t="${t}"][data-g="${g}"]`);
  if(!el||el.value==="")return null;
  return +el.value;
}

function calc(){
  const sum = {
    t1:{g:0,m:0,p:0},
    t2:{g:0,m:0,p:0},
    t3:{g:0,m:0,p:0}
  };

  matches.forEach(match=>{
    let aG=0,bG=0,aP=0,bP=0;
    let completed=0;
    let dream=false;

    for(let i=0;i<5;i++){
      let a=val(match.id,"A",i);
      let b=val(match.id,"B",i);

      if(a!=null&&b!=null){
        aP+=a-b;
        bP+=b-a;

        if(a>b)aG++;
        if(b>a)bG++;

        if(i<4)completed++;
        if(i===4)dream=true;
      }
    }

    let winner=null;

    if(completed===4){
      let ar=0,br=0;
      for(let i=0;i<4;i++){
        let a=val(match.id,"A",i);
        let b=val(match.id,"B",i);
        if(a>b)ar++;
        if(b>a)br++;
      }

      if(ar>br)winner="A";
      else if(br>ar)winner="B";
      else if(dream){
        let a=val(match.id,"A",4);
        let b=val(match.id,"B",4);
        if(a>b)winner="A";
        if(b>a)winner="B";
      }
    }

    const resEl=document.getElementById(`${match.id}-result`);
    resEl.innerHTML="";

    if(winner==="A"){
      resEl.innerHTML=`<span class="win">${teams[match.a]} WINS</span>`;
      sum[match.a].m++;
    } else if(winner==="B"){
      resEl.innerHTML=`<span class="win">${teams[match.b]} WINS</span>`;
      sum[match.b].m++;
    }

    sum[match.a].g+=aG;
    sum[match.b].g+=bG;
    sum[match.a].p+=aP;
    sum[match.b].p+=bP;
  });

  g1.textContent=sum.t1.g; m1.textContent=sum.t1.m; p1.textContent=sum.t1.p;
  g2.textContent=sum.t2.g; m2.textContent=sum.t2.m; p2.textContent=sum.t2.p;
  g3.textContent=sum.t3.g; m3.textContent=sum.t3.m; p3.textContent=sum.t3.p;
}

createMatches();
document.addEventListener("input",e=>{
  if(e.target.type==="number")calc();
});
calc();
</script>

</body>
</html>
